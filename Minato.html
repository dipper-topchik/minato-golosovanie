<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Важный опрос</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            overflow: hidden; /* Чтобы кнопка не убегала за пределы экрана со скроллом */
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h1 {
            color: #1c1e21;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            transition: transform 0.2s;
        }
        .btn-yes {
            background-color: #42b72a;
            color: white;
        }
        .btn-yes:hover {
            background-color: #36a420;
            transform: scale(1.1);
        }
        .btn-no {
            background-color: #fa3e3e;
            color: white;
            position: absolute; /* Позволяет кнопке летать по экрану */
            left: 220px; /* Начальная позиция */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Хотите ли вы чтобы Минато стал ЗГА?</h1>
        <div class="buttons">
            <button class="btn-yes" onclick="confirmChoice()">Да</button>
            <button class="btn-no" id="noButton" onmouseover="moveButton()">Нет</button>
        </div>
    </div>

    <script>
        function moveButton() {
            const btn = document.getElementById('noButton');
            
            // Генерируем случайные координаты с учетом размеров окна
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            // Перемещаем кнопку
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function confirmChoice() {
            alert('Поздравляем! Ваш голос учтен. Минато — будущий ЗГА! 🎉');
        }
    </script>

</body>
</html>
